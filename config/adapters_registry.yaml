# ==============================================================================
# AWA Agent Cortex — Adapter Registry
# ==============================================================================
#
# This file is the single source of truth for all registered adapters.
# It is read at service startup by AdapterRegistryLoader, which dynamically
# imports and instantiates each enabled adapter and wires it into the DI
# container and LLMAdapterRegistry.
#
# DO NOT EDIT MANUALLY — use ac-cli to add/remove/enable/disable adapters:
#   ac-cli adapter onboard  --config <file>   (adds entry here automatically)
#   ac-cli adapter enable   <name>
#   ac-cli adapter disable  <name>
# ==============================================================================

llm:

  - name:         openai
    display_name: "OpenAI"
    class:        awa_agent_cortex.adapters.llm.openai_adapter.OpenAIAdapter
    enabled:      true
    version:      "1.0.0"
    supported_models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-4-turbo
      - gpt-3.5-turbo

  - name:         anthropic
    display_name: "Anthropic"
    class:        awa_agent_cortex.adapters.llm.anthropic_adapter.AnthropicAdapter
    enabled:      true
    version:      "1.0.0"
    supported_models:
      - claude-opus-4-7
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001

  - name:         gemini
    display_name: "Google Gemini"
    class:        awa_agent_cortex.adapters.llm.gemini_adapter.GeminiAdapter
    enabled:      true
    version:      "1.0.0"
    supported_models:
      - gemini-2.0-flash
      - gemini-1.5-pro

  - name:         llama
    display_name: "Meta Llama"
    class:        awa_agent_cortex.adapters.llm.llama_adapter.LlamaAdapter
    enabled:      false
    version:      "1.0.0"
    supported_models:
      - llama-3.3-70b-instruct
      - llama-3.1-8b-instruct

  - name:         mistral
    display_name: "Mistral"
    class:        awa_agent_cortex.adapters.llm.mistral_adapter.MistralAdapter
    enabled:      false
    version:      "1.0.0"
    supported_models:
      - mistral-large-latest
      - mixtral-8x7b-instruct

  - name:         bedrock
    display_name: "AWS Bedrock"
    class:        awa_agent_cortex.adapters.llm.bedrock_adapter.BedrockAdapter
    enabled:      false
    version:      "1.0.0"
    supported_models:
      - amazon.nova-pro-v1
      - amazon.titan-text-premier-v1

  # ── Added by ac-cli adapter onboard ────────────────────────────────────────
  - name:         compass_core42
    display_name: "Compass Core42"
    class:        awa_agent_cortex.adapters.llm.compass_core42_adapter.CompassCore42Adapter
    enabled:      true
    version:      "1.0.0"
    supported_models:
      - compass-core42-v1
      - compass-core42-v2
      - compass-core42-v2-instruct

messaging:

  - name:         kafka
    display_name: "Apache Kafka"
    class_publisher: awa_agent_cortex.adapters.messaging.kafka_publisher.KafkaEventPublisher
    class_consumer:  awa_agent_cortex.adapters.messaging.kafka_consumer.KafkaEventConsumer
    role:         both
    enabled:      true
    version:      "1.0.0"

  - name:         rabbitmq
    display_name: "RabbitMQ"
    class_publisher: awa_agent_cortex.adapters.messaging.rabbitmq_publisher.RabbitMQEventPublisher
    class_consumer:  awa_agent_cortex.adapters.messaging.rabbitmq_consumer.RabbitMQEventConsumer
    role:         both
    enabled:      false
    version:      "1.0.0"

  - name:         azure_service_bus
    display_name: "Azure Service Bus"
    class_publisher: awa_agent_cortex.adapters.messaging.azure_service_bus_publisher.AzureServiceBusPublisher
    class_consumer:  awa_agent_cortex.adapters.messaging.azure_service_bus_consumer.AzureServiceBusConsumer
    role:         both
    enabled:      false
    version:      "1.0.0"

snapshot_store:

  - name:         s3
    display_name: "AWS S3"
    class:        awa_agent_cortex.adapters.snapshot.s3_snapshot_store.S3SnapshotStore
    enabled:      true
    version:      "1.0.0"

  - name:         azure_blob
    display_name: "Azure Blob Storage"
    class:        awa_agent_cortex.adapters.snapshot.azure_blob_snapshot_store.AzureBlobSnapshotStore
    enabled:      false
    version:      "1.0.0"

timer:

  - name:         redis
    display_name: "Redis Timer"
    class:        awa_agent_cortex.infrastructure.timer_service.RedisTimerService
    enabled:      true
    version:      "1.0.0"

  - name:         azure_service_bus_timer
    display_name: "Azure Service Bus Timer"
    class:        awa_agent_cortex.adapters.timer.azure_service_bus_timer_adapter.AzureServiceBusTimerAdapter
    enabled:      false
    version:      "1.0.0"

  - name:         aws_eventbridge_timer
    display_name: "AWS EventBridge Scheduler"
    class:        awa_agent_cortex.adapters.timer.aws_eventbridge_timer_adapter.AWSEventBridgeTimerAdapter
    enabled:      false
    version:      "1.0.0"

  - name:         celery_beat_timer
    display_name: "Celery Beat Timer"
    class:        awa_agent_cortex.adapters.timer.celery_beat_timer_adapter.CeleryBeatTimerAdapter
    enabled:      false
    version:      "1.0.0"

# ── Credential Adapters ────────────────────────────────────────────────────────
# ICredentialProvider implementations. Exactly ONE should be enabled per
# deployment. Provides Bearer tokens and secret values to other adapters.
# Swap here + container.py to change authentication strategy.

credential:

  - name:         azure_managed_identity
    display_name: "Azure Managed Identity"
    class:        awa_agent_cortex.adapters.credential.azure_managed_identity_adapter.AzureManagedIdentityCredentialAdapter
    enabled:      true
    version:      "1.0.0"

  - name:         aws_irsa
    display_name: "AWS IAM Roles for Service Accounts (IRSA)"
    class:        awa_agent_cortex.adapters.credential.aws_irsa_adapter.AWSIRSACredentialAdapter
    enabled:      false
    version:      "1.0.0"

  - name:         vault
    display_name: "HashiCorp Vault"
    class:        awa_agent_cortex.adapters.credential.vault_credential_adapter.VaultCredentialAdapter
    enabled:      false
    version:      "1.0.0"

# ── Guardrail Adapters ─────────────────────────────────────────────────────────
# IGuardrailService implementations. Exactly ONE should be enabled per
# deployment. Provides the AI-layer second line of defence for prompt injection
# and content policy enforcement. The in-process PatternMatcher always runs
# first regardless of which guardrail adapter is active.

guardrail:

  - name:         azure_content_safety
    display_name: "Azure AI Content Safety"
    class:        awa_agent_cortex.adapters.guardrail.azure_content_safety_adapter.AzureContentSafetyGuardrailAdapter
    enabled:      true
    version:      "1.0.0"

  - name:         amazon_comprehend_guardrail
    display_name: "Amazon Comprehend + Bedrock Guardrails"
    class:        awa_agent_cortex.adapters.guardrail.amazon_comprehend_guardrail_adapter.AmazonComprehendGuardrailAdapter
    enabled:      false
    version:      "1.0.0"

  - name:         local_model_guardrail
    display_name: "Self-Hosted Model Guardrail (On-Prem)"
    class:        awa_agent_cortex.adapters.guardrail.local_model_guardrail_adapter.LocalModelGuardrailAdapter
    enabled:      false
    version:      "1.0.0"
