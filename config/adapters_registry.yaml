# ==============================================================================
# AWA Prompt Builder — Adapter Registry
# ==============================================================================
#
# This file is the single source of truth for all registered adapters.
# It is read at service startup by AdapterRegistryLoader, which dynamically
# imports and instantiates each enabled adapter and wires it into the DI
# container and LLMAdapterRegistry.
#
# DO NOT EDIT MANUALLY — use pb-cli to add/remove/enable/disable adapters:
#   pb-cli adapter onboard  --config <file>   (adds entry here automatically)
#   pb-cli adapter enable   <name>
#   pb-cli adapter disable  <name>
# ==============================================================================

llm:

  - name:         openai
    display_name: "OpenAI"
    class:        awa_prompt_builder.adapters.llm.openai_adapter.OpenAIAdapter
    enabled:      true
    version:      "1.0.0"
    supported_models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-4-turbo
      - gpt-3.5-turbo

  - name:         anthropic
    display_name: "Anthropic"
    class:        awa_prompt_builder.adapters.llm.anthropic_adapter.AnthropicAdapter
    enabled:      true
    version:      "1.0.0"
    supported_models:
      - claude-opus-4-7
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001

  - name:         gemini
    display_name: "Google Gemini"
    class:        awa_prompt_builder.adapters.llm.gemini_adapter.GeminiAdapter
    enabled:      true
    version:      "1.0.0"
    supported_models:
      - gemini-2.0-flash
      - gemini-1.5-pro

  - name:         llama
    display_name: "Meta Llama"
    class:        awa_prompt_builder.adapters.llm.llama_adapter.LlamaAdapter
    enabled:      false
    version:      "1.0.0"
    supported_models:
      - llama-3.3-70b-instruct
      - llama-3.1-8b-instruct

  - name:         mistral
    display_name: "Mistral"
    class:        awa_prompt_builder.adapters.llm.mistral_adapter.MistralAdapter
    enabled:      false
    version:      "1.0.0"
    supported_models:
      - mistral-large-latest
      - mixtral-8x7b-instruct

  - name:         bedrock
    display_name: "AWS Bedrock"
    class:        awa_prompt_builder.adapters.llm.bedrock_adapter.BedrockAdapter
    enabled:      false
    version:      "1.0.0"
    supported_models:
      - amazon.nova-pro-v1
      - amazon.titan-text-premier-v1

  # ── Added by pb-cli adapter onboard ────────────────────────────────────────
  - name:         compass_core42
    display_name: "Compass Core42"
    class:        awa_prompt_builder.adapters.llm.compass_core42_adapter.CompassCore42Adapter
    enabled:      true
    version:      "1.0.0"
    supported_models:
      - compass-core42-v1
      - compass-core42-v2
      - compass-core42-v2-instruct

messaging:

  - name:         kafka
    display_name: "Apache Kafka"
    class_publisher: awa_prompt_builder.adapters.messaging.kafka_publisher.KafkaEventPublisher
    class_consumer:  awa_prompt_builder.adapters.messaging.kafka_consumer.KafkaEventConsumer
    role:         both
    enabled:      true
    version:      "1.0.0"

  - name:         rabbitmq
    display_name: "RabbitMQ"
    class_publisher: awa_prompt_builder.adapters.messaging.rabbitmq_publisher.RabbitMQEventPublisher
    class_consumer:  awa_prompt_builder.adapters.messaging.rabbitmq_consumer.RabbitMQEventConsumer
    role:         both
    enabled:      false
    version:      "1.0.0"

  - name:         azure_service_bus
    display_name: "Azure Service Bus"
    class_publisher: awa_prompt_builder.adapters.messaging.azure_service_bus_publisher.AzureServiceBusPublisher
    class_consumer:  awa_prompt_builder.adapters.messaging.azure_service_bus_consumer.AzureServiceBusConsumer
    role:         both
    enabled:      false
    version:      "1.0.0"

snapshot_store:

  - name:         s3
    display_name: "AWS S3"
    class:        awa_prompt_builder.adapters.snapshot.s3_snapshot_store.S3SnapshotStore
    enabled:      true
    version:      "1.0.0"

  - name:         azure_blob
    display_name: "Azure Blob Storage"
    class:        awa_prompt_builder.adapters.snapshot.azure_blob_snapshot_store.AzureBlobSnapshotStore
    enabled:      false
    version:      "1.0.0"

timer:

  - name:         redis
    display_name: "Redis Timer"
    class:        awa_prompt_builder.infrastructure.timer_service.RedisTimerService
    enabled:      true
    version:      "1.0.0"
