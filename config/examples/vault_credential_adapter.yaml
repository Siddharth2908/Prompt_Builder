# ==============================================================================
# AWA Agent Cortex — Adapter Onboarding
# Adapter: HashiCorp Vault (Credential)
# Target:  On-premises Kubernetes or any cluster without a cloud identity provider
# ==============================================================================
#
# WHEN TO USE THIS
#   Your Agent Cortex deployment runs on an on-prem K8s cluster (RKE, k3s,
#   OpenShift, etc.) or in a multi-cloud environment where HashiCorp Vault is
#   the enterprise secrets management standard. Vault's Kubernetes auth method
#   exchanges the pod's projected service account token for a Vault token scoped
#   to the role's policies.
#
# PREREQUISITES
#   1. Vault server reachable from the cluster (TLS recommended).
#   2. Kubernetes auth method enabled in Vault:
#        vault auth enable kubernetes
#        vault write auth/kubernetes/config \
#          kubernetes_host="https://$KUBERNETES_PORT_443_TCP_ADDR:443" \
#          token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
#          kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
#   3. Vault policy for the Agent Cortex role:
#        path "secret/data/awa-agent-cortex/*" {
#          capabilities = ["read"]
#        }
#   4. Vault role bound to the K8s service account:
#        vault write auth/kubernetes/role/awa-agent-cortex \
#          bound_service_account_names=awa-agent-cortex-sa \
#          bound_service_account_namespaces=awa-system \
#          policies=awa-agent-cortex-policy \
#          ttl=1h
#   5. Secrets stored under the KV v2 mount (default path: secret/):
#        vault kv put secret/awa-agent-cortex/openai value=<api-key>
#        vault kv put secret/awa-agent-cortex/postgres value=<password>
#
# USAGE
#   ac-cli adapter validate --config vault_credential_adapter.yaml
#   ac-cli adapter onboard  --config vault_credential_adapter.yaml \
#                           --output-dir ./awa_agent_cortex/adapters/credential/
# ==============================================================================

adapter:

  name:         vault
  display_name: "HashiCorp Vault"
  version:      "1.0.0"
  adapter_type: credential
  author:       "platform-ai@company.com"
  enabled:      false

  credential:
    provider: vault

    # Vault server address. Must be reachable from within the cluster.
    env_var_vault_addr:  VAULT_ADDR      # e.g. https://vault.internal.company.com:8200

    # Name of the Vault Kubernetes auth role (created in step 4 above).
    env_var_vault_role:  VAULT_ROLE      # e.g. awa-agent-cortex

    # Mount path of the Kubernetes auth method (default: kubernetes).
    env_var_vault_mount: VAULT_K8S_MOUNT

    # KV v2 mount path where secrets are stored (default: secret).
    kv_mount: secret

    # Secret paths (relative to kv_mount). Engineers call get_secret("<path>").
    # Convention: awa-agent-cortex/<component>
    #   awa-agent-cortex/openai      → value: <openai-api-key>
    #   awa-agent-cortex/postgres    → value: <db-password>
    #   awa-agent-cortex/redis       → value: <redis-password>

  scaffold:
    generate_class: true
    generate_tests: true
    output_module:  adapters/credential
